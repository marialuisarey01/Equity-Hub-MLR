<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wild Lama — Portal de Inversiones</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Libre+Franklin:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,600;1,8..60,400&display=swap" rel="stylesheet">

<style>
@font-face{font-family:'Minion Pro';src:url('fonts/MinionPro-Regular.otf') format('opentype');font-weight:400;font-style:normal;font-display:swap;}
@font-face{font-family:'Minion Pro';src:url('fonts/MinionPro-Semibold.otf') format('opentype');font-weight:600;font-style:normal;font-display:swap;}

:root{
  --navy:#1E2F4D;
  --navy-deep:#152238;
  --fog:#AEB9C8;
  --fog-soft:#8593A6;
  --line:rgba(255,255,255,.14);
  --line-soft:rgba(255,255,255,.09);
  --paper:#F1F4F8;
  --danger:#E0956B;
  --serif:'Minion Pro','Source Serif 4',Georgia,serif;
  --sans:'Libre Franklin',system-ui,-apple-system,sans-serif;
}

*{box-sizing:border-box;}
html,body{height:100%;}
body{
  margin:0;
  background:var(--navy);
  color:var(--paper);
  font-family:var(--sans);
  display:flex;
  align-items:center;
  justify-content:center;
  min-height:100dvh;
  padding:24px;
  -webkit-font-smoothing:antialiased;
}
a{color:var(--fog);}
a:hover{color:#fff;}

.card{
  width:100%;
  max-width:400px;
  border:1px solid var(--line);
  border-radius:4px;
  padding:52px 44px 44px;
  text-align:center;
  background:linear-gradient(180deg, rgba(255,255,255,.015), rgba(0,0,0,.06));
}

.logo{
  width:66px;height:66px;
  margin:0 auto 26px;
  border:1px solid var(--line);
  border-radius:4px;
  background:var(--navy-deep);
  display:flex;align-items:center;justify-content:center;
}
.logo img{width:44px;height:44px;object-fit:contain;display:block;}

h1{
  font-family:var(--serif);
  font-weight:600;
  font-size:27px;
  line-height:1.15;
  letter-spacing:.01em;
  margin:0 0 14px;
  color:#fff;
}

.lede{
  font-size:14px;
  line-height:1.55;
  color:var(--fog);
  margin:0 auto;
  max-width:290px;
}
.lede strong{color:#fff;font-weight:600;}

.signin{
  margin:34px 0 0;
  min-height:44px;
  display:flex;
  justify-content:center;
}

/* Botón de respaldo (aspecto Google) mientras GIS no ha pintado */
.gbtn-fallback{
  display:inline-flex;align-items:center;gap:12px;
  font-family:var(--sans);font-size:14px;font-weight:500;
  color:var(--navy-deep);background:#fff;
  border:none;border-radius:4px;
  padding:11px 20px;cursor:pointer;
  transition:box-shadow .14s cubic-bezier(.2,.7,.2,1),opacity .14s;
}
.gbtn-fallback:hover{box-shadow:0 1px 6px rgba(0,0,0,.28);}
.gbtn-fallback svg{width:18px;height:18px;}

.divider{
  height:1px;background:var(--line-soft);
  margin:34px -44px 0;
}

.note{
  margin:22px 0 0;
  font-family:var(--serif);
  font-style:italic;
  font-size:13px;
  line-height:1.5;
  color:var(--fog-soft);
}
.note.error{color:var(--danger);font-style:normal;font-family:var(--sans);font-size:12.5px;}

.spinner{
  width:20px;height:20px;border:2px solid var(--line);
  border-top-color:var(--fog);border-radius:50%;
  animation:spin .7s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>
<body>

<main class="card">
  <div class="logo">
    <img src="assets/logo-wildlama-blanco.png" alt="Wild Lama">
  </div>

  <h1>Portal de Inversiones</h1>
  <p class="lede">
    Acceso exclusivo para cuentas <strong>@wildlama.com</strong>. Inicia sesión con tu correo corporativo.
  </p>

  <div class="signin" id="signin"></div>

  <div class="divider"></div>
  <p class="note" id="note">Falta configurar el Client ID de Google para activar el inicio de sesión.</p>
</main>

<script>
/* ============================================================
   Wild Lama — Portal de Inversiones (gate de acceso).
   1) Pega el Client ID de OAuth (Google Cloud → Credenciales) abajo.
   2) Al iniciar sesión con una cuenta @wildlama.com se guarda la
      sesión y se redirige a la app (index.html).
   ============================================================ */

const CLIENT_ID     = "";                 // <-- PEGA AQUÍ EL CLIENT ID DE GOOGLE
const ALLOWED_DOMAIN = "wildlama.com";    // dominio corporativo permitido
const APP_URL        = "index.html";      // destino tras autenticar

const $signin = document.getElementById("signin");
const $note   = document.getElementById("note");

function setNote(text, isError){
  $note.textContent = text;
  $note.classList.toggle("error", !!isError);
}

function decodeJwt(token){
  try{
    const base = token.split(".")[1].replace(/-/g,"+").replace(/_/g,"/");
    const json = decodeURIComponent(atob(base).split("").map(c =>
      "%" + ("00" + c.charCodeAt(0).toString(16)).slice(-2)).join(""));
    return JSON.parse(json);
  }catch(e){ return null; }
}

function handleCredential(resp){
  const data = decodeJwt(resp.credential);
  if(!data){ setNote("No se pudo validar la sesión. Intenta de nuevo.", true); return; }

  const email  = (data.email || "").toLowerCase();
  const domain = (data.hd || email.split("@")[1] || "").toLowerCase();

  if(domain !== ALLOWED_DOMAIN){
    setNote("Debes iniciar sesión con una cuenta @" + ALLOWED_DOMAIN + ".", true);
    return;
  }

  const session = {
    email, name: data.name || "", picture: data.picture || "",
    ts: Date.now()
  };
  sessionStorage.setItem("wl_auth", JSON.stringify(session));
  localStorage.setItem("wl_auth", JSON.stringify(session));
  localStorage.setItem("wl_login_enabled", "1");  // activa el guard de la app
  setNote("Acceso concedido. Redirigiendo…");
  location.replace(APP_URL);
}

function initGoogle(){
  if(!window.google || !google.accounts || !google.accounts.id){
    setNote("No se pudo cargar Google Sign-In. Revisa tu conexión.", true);
    return;
  }
  google.accounts.id.initialize({
    client_id: CLIENT_ID,
    callback: handleCredential,
    hd: ALLOWED_DOMAIN,
    auto_select: false,
    ux_mode: "popup"
  });
  google.accounts.id.renderButton($signin, {
    theme: "outline", size: "large", type: "standard",
    shape: "rectangular", text: "signin_with", logo_alignment: "left",
    width: 280
  });
  setNote("Usa tu cuenta corporativa @" + ALLOWED_DOMAIN + " para continuar.");
}

/* Arranque -------------------------------------------------- */
(function start(){
  // Si ya hay sesión válida, salta directo a la app.
  try{
    const s = JSON.parse(sessionStorage.getItem("wl_auth") || localStorage.getItem("wl_auth") || "null");
    if(s && (s.email || "").toLowerCase().endsWith("@" + ALLOWED_DOMAIN)){
      location.replace(APP_URL); return;
    }
  }catch(e){}

  if(!CLIENT_ID){
    // Sin Client ID: se muestra el aviso (estado del mockup) + botón inactivo.
    $signin.innerHTML = '<button class="gbtn-fallback" disabled style="opacity:.45;cursor:not-allowed">'
      + gLogo() + 'Iniciar sesión con Google</button>';
    setNote("Falta configurar el Client ID de Google para activar el inicio de sesión.");
    return;
  }

  // Con Client ID: mostrar spinner y cargar GIS.
  $signin.innerHTML = '<div class="spinner"></div>';
  setNote("Cargando inicio de sesión…");
  const sc = document.createElement("script");
  sc.src = "https://accounts.google.com/gsi/client";
  sc.async = true; sc.defer = true;
  sc.onload = () => { $signin.innerHTML = ""; initGoogle(); };
  sc.onerror = () => setNote("No se pudo cargar Google Sign-In. Revisa tu conexión.", true);
  document.head.appendChild(sc);
})();

function gLogo(){
  return '<svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">'
    + '<path fill="#EA4335" d="M24 9.5c3.5 0 6.6 1.2 9 3.6l6.7-6.7C35.5 2.4 30.1 0 24 0 14.6 0 6.4 5.4 2.5 13.3l7.9 6.1C12.2 13.6 17.6 9.5 24 9.5z"/>'
    + '<path fill="#4285F4" d="M46.1 24.6c0-1.6-.1-3.1-.4-4.6H24v9.1h12.4c-.5 2.9-2.1 5.3-4.6 6.9l7.1 5.5c4.2-3.8 6.6-9.5 6.6-16.9z"/>'
    + '<path fill="#FBBC05" d="M10.4 28.6c-.5-1.5-.8-3-.8-4.6s.3-3.1.8-4.6l-7.9-6.1C.9 16.3 0 20 0 24s.9 7.7 2.5 10.7l7.9-6.1z"/>'
    + '<path fill="#34A853" d="M24 48c6.5 0 11.9-2.1 15.9-5.8l-7.1-5.5c-2 1.3-4.5 2.1-8.8 2.1-6.4 0-11.8-4.1-13.7-9.7l-7.9 6.1C6.4 42.6 14.6 48 24 48z"/></svg>';
}
</script>
</body>
</html>
